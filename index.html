    <!-- Google Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!--
      Synchronous theme bootstrap: runs BEFORE React mounts to prevent FOUC.
      Reads saved preference from localStorage and applies the `.dark` class
      on <html> so first paint matches the user's last selected mode.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('sujith-portfolio-theme-mode');
          var mode = (saved === 'light' || saved === 'dark') ? saved : 'dark';
          if (mode === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
          document.documentElement.setAttribute('data-theme', mode);
        } catch (e) {
          // If localStorage is unavailable, default to dark mode
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
